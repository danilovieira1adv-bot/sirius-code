version: "3.9"
services:
  sirius-code:
    build: .
    container_name: sirius-code
    restart: unless-stopped
    ports:
      - "5002:5002"
    env_file:
      - .env
    environment:
      - SIRIUS_MASTER_KEY=sk-master-2f1a324700c53c60ad047235dbca0c48
    volumes:
      - ./data:/app/data
      - ./app:/app
      - ./providers:/app/providers
      - /var/run/docker.sock:/var/run/docker.sock
      - /docker:/docker
    networks:
      - sirius-open_sirius-open-net
      - sirius-open-backup_sirius-open-net
networks:
  sirius-open_sirius-open-net:
    external: true
  sirius-open-backup_sirius-open-net:
    external: true
